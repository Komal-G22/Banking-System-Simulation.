<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <div style="text-align:right;">
        <a href="/logout">Logout</a>
    </div>

    <h2>Welcome, <span th:text="${account.name}"></span></h2>

    <p><b>Account Number:</b> <span th:text="${account.accountNumber}"></span></p>
    <p><b>Balance:</b> ₹<span th:text="${account.balance}"></span></p>

    <!-- Messages -->
    <p class="success" th:if="${message}" th:text="${message}"></p>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <hr>

    <h3>Deposit Money</h3>
    <form action="/deposit" method="post">
        <input type="number" name="amount" placeholder="Enter amount" required>
        <button type="submit">Deposit</button>
    </form>

    <h3>Withdraw Money</h3>
    <form action="/withdraw" method="post">
        <input type="number" name="amount" placeholder="Enter amount" required>
        <button type="submit">Withdraw</button>
    </form>

    <hr>

    <form action="/transactions" method="get">
        <button type="submit">View Transaction History</button>
    </form>

</div>

</body>
</html>
