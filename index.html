<!DOCTYPE html>
<html>
<head>
    <title>Banking App</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    <form action="/createAccount" method="post">
        <input type="text" name="name" placeholder="Full Name" required>

        <input type="password" name="pin" placeholder="4-digit PIN" required>

        <input type="number" name="balance" placeholder="Initial Balance" required>

        <button type="submit">Create Account</button>
    </form>

    <hr>

    <h2>Login</h2>

    <form action="/login" method="post">
        <input type="number" name="accountNumber" placeholder="Account Number" required>

        <input type="password" name="pin" placeholder="PIN" required>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
